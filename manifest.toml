#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "screego"
name = "Screego"
description.en = "Screen sharing for developers"
description.fr = "Partage d'écran pour les développeurs"

version = "1.12.4~ynh1"

maintainers = ["eric_G"]

[upstream]
license = "GPL-3.0"
website = "https://screego.net/#/"
demo = "https://app.screego.net/"
admindoc = "https://screego.net/#/"
code = "https://github.com/screego/server"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false

sso = false

disk = "50M"
ram.build = "50M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

    [install.admin]
    type = "user"

    [install.password]
    type = "password"

[resources]

    [resources.sources]

    [resources.sources.main]
    in_subdir = false
    amd64.url = "https://github.com/screego/server/releases/download/v1.12.4/screego_1.12.4_linux_amd64.tar.gz"
    amd64.sha256 = "f7dc5ee1f32cec7691cb5c51d9dd9b618cfdda25e7fe59360b6014e308cbb652"
    arm64.url = "https://github.com/screego/server/releases/download/v1.12.4/screego_1.12.4_linux_arm64.tar.gz"
    arm64.sha256 = "47026d78cd0a8bd1f039a899a0b4015b4e0ead2b513e9caa6cd2e3c11f135810"
    armhf.url = "https://github.com/screego/server/releases/download/v1.12.4/screego_1.12.4_linux_armv7.tar.gz"
    armhf.sha256 = "761863eeb09e821fe73e77720f777c1f90800dfe17c530f86d94dd117aeb059c"
    autoupdate.asset.amd64 = "screego_\\d+\\.\\d+\\.\\d+_linux_amd64\\.tar\\.gz"
    autoupdate.asset.arm64 = "screego_\\d+\\.\\d+\\.\\d+_linux_arm64\\.tar\\.gz"
    autoupdate.asset.armhf = "screego_\\d+\\.\\d+\\.\\d+_linux_armv7\\.tar\\.gz"
    autoupdate.strategy = "latest_github_release"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 5050
    turn.default = 3478
    turn.exposed = "Both"
